$kind: http-request
name: Get Current User (Me)
method: GET
url: '{{baseUrl}}/auth/me'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

      pm.test("Response contains user object", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("data");
        pm.expect(body.data).to.have.property("user");
        pm.expect(body.data.user).to.have.property("id");
        pm.expect(body.data.user).to.have.property("email");
        pm.expect(body.data.user).to.have.property("role");
      });
