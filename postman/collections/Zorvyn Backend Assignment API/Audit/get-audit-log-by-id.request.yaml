$kind: http-request
name: Get Audit Log By Id
method: GET
url: '{{baseUrl}}/audit-logs/{{auditLogId}}'
order: 2000
pathVariables:
  - key: auditLogId
    value: '{{auditLogId}}'
    description: UUID of the audit log to fetch
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

      pm.test("Response contains audit log", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("data");
        pm.expect(body.data).to.have.property("log");
      });
