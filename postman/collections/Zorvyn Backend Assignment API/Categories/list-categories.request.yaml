$kind: http-request
name: List Categories
method: GET
url: '{{baseUrl}}/categories?page=1&limit=50'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

      pm.test("Response contains categories", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("data");
        pm.expect(body.data).to.have.property("categories");
      });

      // Auto-save first category id when available
      if (pm.response.code === 200) {
        const body = pm.response.json();
        const firstCategory = body?.data?.categories?.[0];
        if (firstCategory && firstCategory.id) {
          pm.collectionVariables.set("categoryId", firstCategory.id);
        }
      }
