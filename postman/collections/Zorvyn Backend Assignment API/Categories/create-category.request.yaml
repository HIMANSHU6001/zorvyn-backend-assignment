$kind: http-request
name: Create Category
method: POST
url: '{{baseUrl}}/categories'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Groceries"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

      pm.test("Response contains category", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("data");
        pm.expect(body.data).to.have.property("category");
      });

      // Auto-save category id for record create/update requests
      if (pm.response.code === 201) {
        const body = pm.response.json();
        const category = body?.data?.category;
        if (category && category.id) {
          pm.collectionVariables.set("categoryId", category.id);
        }
      }
