$kind: http-request
name: Get Dashboard Summary (Custom Range)
method: GET
url: '{{baseUrl}}/dashboard/summary?startDate={{dashboardStartDate}}&endDate={{dashboardEndDate}}&recentPage=1&recentLimit=5&groupBy=day'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Range type is CUSTOM", function () {
        const body = pm.response.json();
        pm.expect(body.data.range.type).to.eql("CUSTOM");
      });
