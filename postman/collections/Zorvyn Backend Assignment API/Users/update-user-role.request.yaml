$kind: http-request
name: 'Update User Role'
method: PATCH
url: '{{baseUrl}}/users/{{userId}}/role'
order: 1010
pathVariables:
  - key: userId
    value: '{{userId}}'
    description: UUID of the user whose role is being updated
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "role": "ANALYST"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

      pm.test("Response contains updated user role", function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property("data");
        pm.expect(body.data).to.have.property("user");
        pm.expect(body.data.user).to.have.property("role");
      });

      pm.test("Role value is valid", function () {
        const body = pm.response.json();
        pm.expect(["VIEWER", "ANALYST", "ADMIN"]).to.include(body.data.user.role);
      });
