openapi: 3.0.3
info:
  title: Finance Dashboard API
  version: 1.0.0
  description: API documentation for authentication, RBAC, health checks, and user management.
servers:
  - url: /
    description: Current environment (same origin)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        details:
          nullable: true
    SuccessEnvelope:
      type: object
      required:
        - success
        - data
        - meta
        - error
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        meta:
          nullable: true
        error:
          nullable: true
    ErrorEnvelope:
      type: object
      required:
        - success
        - data
        - meta
        - error
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        meta:
          nullable: true
          example: null
        error:
          $ref: '#/components/schemas/ApiError'
    RegisterBody:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: Password@123
    LoginBody:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: Password@123
    UserStatusBody:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          example: INACTIVE
    UserRoleBody:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [VIEWER, ANALYST, ADMIN]
          example: ANALYST
    CategoryBody:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Groceries
    RecordBody:
      type: object
      required:
        - amount
        - type
        - categoryId
        - date
      properties:
        amount:
          type: number
          format: float
          example: 1500.5
        type:
          type: string
          enum: [INCOME, EXPENSE]
          example: INCOME
        categoryId:
          type: string
          format: uuid
          example: 4dc49d52-8f1d-4e07-b5da-f04b11bd2f56
        date:
          type: string
          format: date-time
          example: 2026-04-01T00:00:00.000Z
        note:
          type: string
          nullable: true
          example: Monthly salary
    RecordUpdateBody:
      type: object
      properties:
        amount:
          type: number
          format: float
          example: 280.75
        type:
          type: string
          enum: [INCOME, EXPENSE]
          example: EXPENSE
        categoryId:
          type: string
          format: uuid
          example: 4dc49d52-8f1d-4e07-b5da-f04b11bd2f56
        date:
          type: string
          format: date-time
          example: 2026-04-02T00:00:00.000Z
        note:
          type: string
          nullable: true
          example: Weekly supermarket bill
    AuditLogObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        action:
          type: string
          enum: [CREATE, UPDATE, DELETE]
        entityType:
          type: string
          enum: [USER, FINANCIAL_RECORD]
        entityId:
          type: string
        metadata:
          nullable: true
        createdAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            role:
              type: string
              enum: [VIEWER, ANALYST, ADMIN]
            status:
              type: string
              enum: [ACTIVE, INACTIVE]
    DashboardSummaryObject:
      type: object
      properties:
        range:
          type: object
          properties:
            startDate:
              type: string
              format: date-time
            endDate:
              type: string
              format: date-time
            type:
              type: string
              enum: [MTD, MONTH, CUSTOM]
        summary:
          type: object
          properties:
            totalIncome:
              type: number
            totalExpenses:
              type: number
            netBalance:
              type: number
        categoryTotals:
          type: array
          items:
            type: object
            properties:
              categoryId:
                type: string
                format: uuid
              categoryName:
                type: string
              income:
                type: number
              expenses:
                type: number
              total:
                type: number
              count:
                type: integer
        recentActivity:
          type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  amount:
                    type: number
                  type:
                    type: string
                    enum: [INCOME, EXPENSE]
                  date:
                    type: string
                    format: date-time
                  note:
                    type: string
                    nullable: true
                  createdAt:
                    type: string
                    format: date-time
                  category:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
            pagination:
              type: object
              properties:
                page:
                  type: integer
                limit:
                  type: integer
                total:
                  type: integer
        trends:
          type: array
          items:
            type: object
            properties:
              bucket:
                type: string
                format: date-time
              income:
                type: number
              expenses:
                type: number
              netBalance:
                type: number
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Application health check
      responses:
        '200':
          description: Application is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /api/health/redis:
    get:
      tags: [Health]
      summary: Redis health check
      responses:
        '200':
          description: Redis is connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '503':
          description: Redis is not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Dashboard summary for authenticated user
      description: Returns summary totals, category totals, recent activity, and trends for a selected time range.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          schema:
            type: string
            pattern: '^[0-9]{4}-(0[1-9]|1[0-2])$'
            example: 2026-04
          description: Month filter in YYYY-MM format. Used only when startDate/endDate are not provided.
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
            example: 2026-04-01T00:00:00.000Z
          description: Custom range start. Must be provided with endDate.
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
            example: 2026-04-30T23:59:59.999Z
          description: Custom range end. Must be provided with startDate.
        - in: query
          name: recentPage
          schema:
            type: integer
            minimum: 1
            example: 1
        - in: query
          name: recentLimit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 5
        - in: query
          name: groupBy
          schema:
            type: string
            enum: [day, month]
            example: day
          description: Optional explicit trends grouping. Overrides automatic grouping.
      responses:
        '200':
          description: Dashboard summary response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user (default role VIEWER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBody'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and obtain access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: User account is inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: User account is inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/users/{id}/status:
    patch:
      tags: [Users]
      summary: Update user status (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserStatusBody'
      responses:
        '200':
          description: User status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (requires ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/users/{id}/role:
    patch:
      tags: [Users]
      summary: Assign role to another user (ADMIN only)
      description: Only ADMIN users can assign roles. Self-assignment is blocked and inactive users cannot be assigned roles.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleBody'
      responses:
        '200':
          description: User role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (requires ADMIN, self-assignment blocked, or target user inactive)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/categories:
    post:
      tags: [Categories]
      summary: Create a new category for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryBody'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Category already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      tags: [Categories]
      summary: List categories for dropdown/autocomplete
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            example: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 50
        - in: query
          name: search
          schema:
            type: string
            example: gro
      responses:
        '200':
          description: Paginated categories list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/categories/{id}:
    delete:
      tags: [Categories]
      summary: Soft delete a category
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/audit-logs:
    get:
      tags: [Audit]
      summary: List audit logs (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            example: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 10
        - in: query
          name: action
          schema:
            type: string
            enum: [CREATE, UPDATE, DELETE]
        - in: query
          name: entityType
          schema:
            type: string
            enum: [USER, FINANCIAL_RECORD]
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
        - in: query
          name: entityId
          schema:
            type: string
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (requires ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/audit-logs/{id}:
    get:
      tags: [Audit]
      summary: Get audit log by id (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Audit log details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (requires ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Audit log not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/records:
    post:
      tags: [Records]
      summary: Create a financial record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordBody'
      responses:
        '201':
          description: Record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (requires ANALYST or ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      tags: [Records]
      summary: List records with filters and pagination
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            example: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 10
        - in: query
          name: type
          schema:
            type: string
            enum: [INCOME, EXPENSE]
        - in: query
          name: categoryId
          schema:
            type: string
            format: uuid
            example: 4dc49d52-8f1d-4e07-b5da-f04b11bd2f56
        - in: query
          name: search
          schema:
            type: string
            example: food
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated records list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/records/{id}:
    get:
      tags: [Records]
      summary: Get a single record by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Record details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Records]
      summary: Update a record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordUpdateBody'
      responses:
        '200':
          description: Record updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (requires ANALYST or ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Records]
      summary: Soft delete a record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Record soft deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (requires ANALYST or ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
